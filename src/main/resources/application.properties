spring.application.name=authSphere

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/authsphere_identity}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# Mail Configuration
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:b757ab2d40e07f}
spring.mail.password=${MAIL_PASSWORD:418693157e13d6}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8

# JWT Configuration
auth.jwt.access-secret=${JWT_ACCESS_SECRET:dev-access-secret-key-with-at-least-32-bytes!!}
auth.jwt.refresh-secret=${JWT_REFRESH_SECRET:dev-refresh-secret-key-with-at-least-32-bytes!}
auth.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:900}
auth.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:1209600}

# Rate Limiting Configuration
auth.rate-limit.login-max-per-minute=${AUTH_RATE_LIMIT_LOGIN_PER_MINUTE:10}
auth.rate-limit.refresh-max-per-minute=${AUTH_RATE_LIMIT_REFRESH_PER_MINUTE:30}
auth.rate-limit.biometric-register-max-per-minute=${AUTH_RATE_LIMIT_BIOMETRIC_REGISTER_PER_MINUTE:8}
auth.rate-limit.biometric-login-max-per-minute=${AUTH_RATE_LIMIT_BIOMETRIC_LOGIN_PER_MINUTE:20}

# Token Expiry Configuration (in seconds)
auth.token-reset.expiry-seconds=3600
auth.token-verification.expiry-seconds=86400

# Verification Email Configuration
auth.email.enabled=${AUTH_EMAIL_ENABLED:false}
auth.email.from=${AUTH_EMAIL_FROM:no-reply@authsphere.local}
auth.email.verification-base-url=${AUTH_EMAIL_VERIFICATION_BASE_URL:http://localhost:8080/api/v1/auth/verify-email}

