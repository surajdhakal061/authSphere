spring.datasource.url=jdbc:h2:mem:authsphere;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.liquibase.enabled=false

auth.jwt.access-secret=test-access-secret-key-with-at-least-32-bytes!!
auth.jwt.refresh-secret=test-refresh-secret-key-with-at-least-32-bytes!
auth.jwt.access-token-ttl-seconds=900
auth.jwt.refresh-token-ttl-seconds=1209600
auth.rate-limit.login-max-per-minute=10
auth.rate-limit.refresh-max-per-minute=30
auth.rate-limit.biometric-register-max-per-minute=8
auth.rate-limit.biometric-login-max-per-minute=20
auth.token-verification.expiry-seconds=86400
auth.email.enabled=false
auth.email.from=no-reply@test.local
auth.email.verification-base-url=http://localhost:8080/api/v1/auth/verify-email
auth.email.reset-base-url=http://localhost:5173/reset-password

